    <style>
      body {
        font-family: 'Alexandria', sans-serif;
        background-color: #000000;
        color: #ffffff;
      }
      
      /* Money formatting to ensure correct BiDi behavior */
      .money {
        unicode-bidi: isolate;
        white-space: nowrap;
        display: inline-block;
      }

      /* Desktop Custom Scrollbar (Only for non-mobile) */
      @media (min-width: 769px) {
        ::-webkit-scrollbar {
          width: 8px;
        }
        ::-webkit-scrollbar-track {
          background: #111;
        }
        ::-webkit-scrollbar-thumb {
          background: #333;
          border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #555;
        }
      }

      /* Mobile: Hide visible scrollbar globally while keeping scroll functionality */
      @media (max-width: 768px) {
        /* Hide scrollbar for Chrome, Safari and Opera */
        ::-webkit-scrollbar {
          display: none !important;
          width: 0 !important;
          height: 0 !important;
          background: transparent !important;
          -webkit-appearance: none !important;
        }
        
        /* Hide scrollbar for IE, Edge and Firefox */
        html, body, #root, main, div, section, article, aside, ul {
          -ms-overflow-style: none !important;  /* IE and Edge */
          scrollbar-width: none !important;  /* Firefox */
        }
        
        /* Catch-all to ensure nested scroll containers also hide bars */
        * {
          -ms-overflow-style: none !important;
          scrollbar-width: none !important;
        }
      }
    </style>
    <script>
